      --bg:      #008080;
      --face:    #c0c0c0;
      --shadow:  #808080;
      --dksh:    #404040;
      --hi:      #ffffff;
      --black:   #000000;
      --blue:    #000080;
      --bltitle: #1084d0;
    }

    body { background: var(--bg); width: 100vw; height: 100vh; overflow: hidden; }

    /* ═══ MAIN WINDOW ═══ */
    #mainWindow {
      background: var(--face);
      width: 680px; height: 480px;
      min-width: 300px; min-height: 220px;
      position: fixed; top: 50px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column;
      border-top: 2px solid var(--hi);   border-left:  2px solid var(--hi);
      border-right: 2px solid var(--dksh); border-bottom: 2px solid var(--dksh);
    }

    /* ── Title bar ── */
    .titlebar {
      background: linear-gradient(to right, var(--blue), var(--bltitle));
      padding: 2px 3px 2px 4px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; cursor: default; user-select: none; height: 20px;
    }
    .tb-left {
      display: flex; align-items: center; gap: 4px;
      color: #fff; font-size: 11px; font-weight: bold;
    }
    .tb-btns { display: flex; gap: 2px; }
    .wbtn {
      width: 16px; height: 14px;
      background: var(--face);
      border-top: 1px solid var(--hi);   border-left:  1px solid var(--hi);
      border-right: 1px solid var(--dksh); border-bottom: 1px solid var(--dksh);
      display: flex; align-items: center; justify-content: center;
      cursor: default; font-size: 9px; font-weight: bold;
      color: var(--black); line-height: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    .wbtn:active {
      border-top: 1px solid var(--dksh);   border-left:  1px solid var(--dksh);
      border-right: 1px solid var(--hi); border-bottom: 1px solid var(--hi);
      padding-top: 1px; padding-left: 1px;
    }
    .wbtn-min::before { content: '__'; font-size: 7px; margin-top: 1px; }
    .wbtn-max::before { content: '◻'; font-size: 9px; }
    .wbtn-close::before { content: 'X'; font-size: 8px; }

    /* ── Menu bar ── */
    .menubar {
      display: flex; padding: 1px 2px;
      border-bottom: 1px solid var(--shadow);
      flex-shrink: 0;
    }
    .mitem { padding: 2px 7px; cursor: default; color: var(--black); }
    .mitem:hover { background: var(--blue); color: #fff; }
    .mitem u { text-decoration: underline; }

    /* Dropdown menu */
    .dropdown {
      position: absolute; top: 52px; left: 45px;
      background: var(--face);
      border: 1px solid var(--shadow);
      box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      z-index: 1000; min-width: 140px;
    }
    .dropdown-item {
      padding: 4px 12px; cursor: default;
      font-size: 12px; color: var(--black);
    }
    .dropdown-item:hover { background: var(--blue); color: #fff; }
    .dropdown-sep { height: 1px; background: var(--shadow); margin: 2px 0; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 5px;
      border-bottom: 1px solid var(--shadow);
      flex-shrink: 0;
    }
    .tsep {
      width: 0; height: 18px;
      border-left: 1px solid var(--shadow);
      border-right: 1px solid var(--hi);
      margin: 0 3px;
    }
    .tbtn {
      background: var(--face);
      border-top: 1px solid var(--hi);   border-left:  1px solid var(--hi);
      border-right: 1px solid var(--dksh); border-bottom: 1px solid var(--dksh);
      padding: 2px 10px; cursor: default; color: var(--black);
    }
    .tbtn:hover:not(:disabled) { background: #d4d0c8; }
    .tbtn:active:not(:disabled) {
      border-top: 1px solid var(--dksh);   border-left:  1px solid var(--dksh);
      border-right: 1px solid var(--hi); border-bottom: 1px solid var(--hi);
      padding: 3px 9px 1px 11px;
    }
    .tbtn:disabled { color: var(--shadow); text-shadow: 1px 1px 0 var(--hi); pointer-events: none; }

    .search-field {
      border-top: 1px solid var(--dksh);  border-left:  1px solid var(--dksh);
      border-right: 1px solid var(--hi); border-bottom: 1px solid var(--hi);
      background: #fff; padding: 1px 4px; width: 140px; outline: none;
    }

    /* ── Content area ── */
    .content {
      flex: 1; margin: 4px;
      background: #fff;
      border-top: 1px solid var(--dksh);  border-left:  1px solid var(--dksh);
      border-right: 1px solid var(--hi); border-bottom: 1px solid var(--hi);
      overflow-y: auto; padding: 8px; min-height: 0;
    }

    /* ── Icon grid ── */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
      gap: 4px 2px;
    }
    .app-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 4px 3px; cursor: default;
      border: 1px solid transparent; user-select: none;
    }
    .app-item.selected { background: var(--blue); border: 1px dotted #fff; }
    .app-item.selected .app-label { color: #fff; }
    .app-item:not(.selected):hover { border: 1px dotted var(--shadow); }

    .icon-box {
      width: 56px; height: 56px;
      background: #7e8080;
      border-top: 1px solid var(--hi);   border-left:  1px solid var(--hi);
      border-right: 1px solid var(--shadow); border-bottom: 1px solid var(--shadow);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; position: relative; overflow: hidden; flex-shrink: 0;
    }
    .icon-box img { width: 100%; height: 100%; object-fit: contain; image-rendering: auto; padding: 4px; }
    .app-label {
      color: var(--black); text-align: center;
      line-height: 1.25; max-width: 80px; font-size: 10px;
      display: -webkit-box; text-overflow: ellipsis; -webkit-box-orient: vertical;
      overflow: none; max-height: 2.5em;
    }
    .app-item.hidden { display: none; }

    /* ── Status bar ── */
    .statusbar {
      display: flex; gap: 2px; padding: 2px 4px;
      flex-shrink: 0; border-top: 1px solid var(--shadow);
    }
    .spanel {
      border-top: 1px solid var(--dksh);  border-left:  1px solid var(--dksh);
      border-right: 1px solid var(--hi); border-bottom: 1px solid var(--hi);
      padding: 1px 6px; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* resize handled by invisible edge zones — no visible grip needed */

    /* ═══ MODAL OVERLAY ═══ */
    .overlay { display: none; position: fixed; inset: 0; z-index: 100; }
    .overlay.active { display: block; }

    /* ═══ DIALOG SHELL ═══ */
    .dialog {
      position: fixed; z-index: 101;
      background: var(--face);
      border-top: 2px solid var(--hi);   border-left:  2px solid var(--hi);
      border-right: 2px solid var(--dksh); border-bottom: 2px solid var(--dksh);
      display: none; flex-direction: column; user-select: none;
    }
    .dialog.open { display: flex; }

    /* ── Dialog body ── */
    .dlg-body { padding: 10px 14px 6px; display: flex; flex-direction: column; gap: 8px; }

    .field-row { display: flex; align-items: center; gap: 6px; }
    .field-row label { width: 52px; text-align: right; flex-shrink: 0; }
    .field-row input, .field-row textarea {
      flex: 1;
      border-top: 1px solid var(--dksh);  border-left:  1px solid var(--dksh);
      border-right: 1px solid var(--hi); border-bottom: 1px solid var(--hi);
      background: #fff; padding: 2px 4px; outline: none;
      font-family: inherit; font-size: 11px;
    }
    .field-row textarea { height: 44px; resize: none; line-height: 1.4; }

    .dlg-hint { font-size: 10px; color: var(--shadow); padding: 0 14px 2px 68px; line-height: 1.5; }

    .dlg-sep { height: 0; border-top: 1px solid var(--shadow); border-bottom: 1px solid var(--hi); margin: 4px 0 0; }

    .btn-row { display: flex; justify-content: flex-end; gap: 6px; padding: 8px 14px 10px; }

    .dbtn {
      background: var(--face); min-width: 72px; text-align: center;
      border-top: 1px solid var(--hi);   border-left:  1px solid var(--hi);
      border-right: 1px solid var(--dksh); border-bottom: 1px solid var(--dksh);
      padding: 3px 12px; cursor: default;
    }
    .dbtn:hover { background: #d4d0c8; }
    .dbtn:active {
      border-top: 1px solid var(--dksh);   border-left:  1px solid var(--dksh);
      border-right: 1px solid var(--hi); border-bottom: 1px solid var(--hi);
      padding: 4px 11px 2px 13px;
    }
    .dbtn.default {
      border: 2px solid var(--black); padding: 2px 10px;
    }
    .dbtn.default:active { padding: 3px 9px 1px 11px; }

    /* icon preview */
    #iconPreview {
      width: 38px; height: 38px; flex-shrink: 0;
      background: var(--face);
      border-top: 1px solid var(--dksh);  border-left:  1px solid var(--dksh);
      border-right: 1px solid var(--hi); border-bottom: 1px solid var(--hi);
      display: flex; align-items: center; justify-content: center; font-size: 22px;
    }
    #iconPreview img { width: 30px; height: 30px; object-fit: contain; }

    /* confirm dialog */
    .confirm-body { display: flex; gap: 12px; align-items: flex-start; padding: 12px 14px 8px; }
    .confirm-icon { font-size: 32px; flex-shrink: 0; line-height: 1; }
    .confirm-text { line-height: 1.6; color: var(--black); padding-top: 4px; }
  </style>
</head>
<body>

<!-- ═══════════ MAIN WINDOW ═══════════ -->
<div id="mainWindow">
  <div class="titlebar" id="mainTitlebar">
    <div class="tb-left"><span id="windowTitle">My Launchpad</span></div>
    <div class="tb-btns">
      <div class="wbtn wbtn-min"></div>
      <div class="wbtn wbtn-max"></div>
      <div class="wbtn wbtn-close"></div>
    </div>
  </div>

  <div class="menubar">
    <div class="mitem"><u>F</u>ile</div>
    <div class="mitem"><u>E</u>dit</div>
    <div class="mitem" id="viewMenu" onclick="toggleViewMenu()"><u>V</u>iew ▾</div>
    <div class="mitem"><u>H</u>elp</div>
  </div>

  <!-- View dropdown menu -->
  <div class="dropdown" id="viewDropdown" style="display:none;">
    <div class="dropdown-item" onclick="zoomIn()">Zoom In +</div>
    <div class="dropdown-item" onclick="zoomOut()">Zoom Out -</div>
    <div class="dropdown-sep"></div>
    <div class="dropdown-item" onclick="resetZoom()">Reset Zoom</div>
  </div>

  <div class="toolbar">
    <button class="tbtn" onclick="openAdd()">Add</button>
    <button class="tbtn" id="btnRemove" onclick="openRemove()" disabled>Remove</button>
    <div class="tsep"></div>
    <input class="search-field" id="searchInput" type="text" placeholder="Search..."
           oninput="filterApps(this.value)" />
  </div>

  <div class="content" id="contentArea">
    <div class="app-grid" id="appGrid"></div>
  </div>

  <div class="statusbar">
    <div class="spanel" id="statusText">Ready</div>
    <div class="spanel" style="flex:0 0 auto;width:90px;text-align:center;" id="clock"></div>
  </div>

</div>


<!-- ═══════════ ADD DIALOG ═══════════ -->
<div class="overlay" id="addOverlay"></div>
<div class="dialog" id="addDialog" style="width:360px;">
  <div class="titlebar" id="addTitlebar">
    <div class="tb-left"><span>Add Application</span></div>
    <div class="tb-btns"><div class="wbtn" onclick="closeAdd()" style="font-size:9px;">✕</div></div>
  </div>
  <div class="dlg-body">
    <div class="field-row">
      <label>Name:</label>
      <input type="text" id="addName" placeholder="e.g. Zendesk" />
    </div>
    <div class="field-row">
      <label>URL:</label>
      <input type="text" id="addUrl" placeholder="https://..." />
    </div>
    <div class="field-row" style="align-items:flex-start;">
      <label style="padding-top:3px;">Base64:</label>
      <textarea id="addB64" placeholder="Paste base64 image data here (optional)"></textarea>
    </div>
    <div class="field-row">
      <label>Emoji:</label>
      <input type="text" id="addEmoji" placeholder="🔗" style="max-width:54px;" />
      <div id="iconPreview">🔗</div>
      <span style="color:var(--shadow);font-size:10px;padding-left:4px;">Used if no Base64</span>
    </div>
  </div>
  <div class="dlg-hint">Tip: convert images at base64-image.de, paste the result into Base64 above.</div>
  <div class="dlg-sep"></div>
  <div class="btn-row">
    <button class="dbtn default" onclick="confirmAdd()">OK</button>
    <button class="dbtn"         onclick="closeAdd()">Cancel</button>
  </div>
</div>


<!-- ═══════════ REMOVE DIALOG ═══════════ -->
<div class="overlay" id="rmOverlay"></div>
<div class="dialog" id="rmDialog" style="width:290px;">
  <div class="titlebar" id="rmTitlebar">
    <div class="tb-left"><span>Confirm Removal</span></div>
    <div class="tb-btns"><div class="wbtn" onclick="closeRemove()" style="font-size:9px;">✕</div></div>
  </div>
  <div class="confirm-body">
    <div class="confirm-icon">[X]</div>
    <div class="confirm-text" id="rmMsg">Remove this application?</div>
  </div>
  <div class="dlg-sep"></div>
  <div class="btn-row">
    <button class="dbtn default" onclick="confirmRemove()">OK</button>
    <button class="dbtn"         onclick="closeRemove()">Cancel</button>
  </div>
</div>


<script>
  let selectedIndex = null;

  // Zoom functionality
  let zoomLevel = 120; // percentage
  const zoomStep = 10;
  const minZoom = 50;
  const maxZoom = 200;

  function applyZoom() {
    const content = document.getElementById('contentArea');
    const grid = document.getElementById('appGrid');
    if (content) {
      content.style.fontSize = (zoomLevel / 100) + 'em';
    }
    // Update icon sizes based on zoom
    document.querySelectorAll('.icon-box').forEach(box => {
      const baseSize = 56;
      const size = baseSize * (zoomLevel / 100);
      box.style.width = size + 'px';
      box.style.height = size + 'px';
      box.style.fontSize = (32 * zoomLevel / 100) + 'px';
      // Images fill 100% via CSS, no need to set pixel dimensions
    });
    document.querySelectorAll('.app-label').forEach(label => {
      label.style.fontSize = (11 * zoomLevel / 100) + 'px';
    });
    // Update grid column size
    if (grid) {
      const colSize = 82 * (zoomLevel / 100);
      grid.style.gridTemplateColumns = `repeat(auto-fill, minmax(${colSize}px, 1fr))`;
    }
    updateZoomStatus();
  }

  function zoomIn() {
    if (zoomLevel < maxZoom) {
      zoomLevel += zoomStep;
      applyZoom();
    }
    closeDropdowns();
  }

  function zoomOut() {
    if (zoomLevel > minZoom) {
      zoomLevel -= zoomStep;
      applyZoom();
    }
    closeDropdowns();
  }

  function resetZoom() {
    zoomLevel = 100;
    applyZoom();
    closeDropdowns();
  }

  function updateZoomStatus() {
    const statusText = document.getElementById('statusText');
    if (statusText && statusText.dataset.baseText) {
      statusText.textContent = statusText.dataset.baseText + ` | Zoom: ${zoomLevel}%`;
    }
  }

  function toggleViewMenu() {
    const dropdown = document.getElementById('viewDropdown');
    const isVisible = dropdown.style.display !== 'none';
    closeDropdowns();
    if (!isVisible) {
      dropdown.style.display = 'block';
    }
  }

  function closeDropdowns() {
    document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
  }

  // Close dropdowns when clicking elsewhere
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.mitem') && !e.target.closest('.dropdown')) {
      closeDropdowns();
    }
  });

  document.getElementById('windowTitle').textContent = LAUNCHPAD_TITLE;
  document.title = LAUNCHPAD_TITLE;

  /* ── Render ──────────────────────────────────── */
  function renderGrid() {
    const grid = document.getElementById('appGrid');
    grid.innerHTML = '';
    APPS.forEach((app, i) => {
      const el = document.createElement('div');
      el.className = 'app-item' + (i === selectedIndex ? ' selected' : '');
      el.dataset.idx  = i;
      el.dataset.name = app.name.toLowerCase();

      let iconHtml = app.icon && app.icon.startsWith('img:')
        ? `<img src="${app.icon.slice(4)}" alt="${app.name}" />`
        : (app.icon || '🔗');

      el.innerHTML = `
        <div class="icon-box">${iconHtml}</div>
        <div class="app-label">${app.name}</div>`;

      el.addEventListener('click',    e => { e.stopPropagation(); selectApp(i); });
      el.addEventListener('dblclick', ()  => { if (app.url && app.url !== '#') window.open(app.url, '_blank'); });
      el.addEventListener('mouseenter', () => {
        document.getElementById('statusText').textContent = (app.url && app.url !== '#') ? app.url : app.name;
      });
      el.addEventListener('mouseleave', updateStatus);
      grid.appendChild(el);
    });
    updateStatus();
    applyZoom(); // Apply current zoom level after rendering
  }

  function selectApp(idx) {
    selectedIndex = idx;
    document.querySelectorAll('.app-item').forEach((el, i) => {
      const sel = i === idx;
      el.classList.toggle('selected', sel);
    });
    document.getElementById('btnRemove').disabled = false;
    updateStatus();
  }

  function clearSelection() {
    selectedIndex = null;
    document.querySelectorAll('.app-item').forEach(el => el.classList.remove('selected'));
    document.getElementById('btnRemove').disabled = true;
    updateStatus();
  }

  document.getElementById('contentArea').addEventListener('click', e => {
    if (!e.target.closest('.app-item')) clearSelection();
  });

  function updateStatus() {
    const n = APPS.length;
    const sel = selectedIndex !== null ? ` — "${APPS[selectedIndex].name}" selected` : '';
    const baseText = `${n} application${n!==1?'s':''}${sel}`;
    const statusText = document.getElementById('statusText');
    statusText.textContent = baseText + ` | Zoom: ${zoomLevel}%`;
    statusText.dataset.baseText = baseText;
  }

  /* ── Search ──────────────────────────────────── */
  function filterApps(q) {
    q = q.toLowerCase().trim();
    document.querySelectorAll('.app-item').forEach(el => {
      el.classList.toggle('hidden', !!q && !el.dataset.name.includes(q));
    });
  }

  /* ── Clock ───────────────────────────────────── */
  (function tick() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    setTimeout(tick, 15000);
  })();

  /* ── Drag helper ─────────────────────────────── */
  function makeDraggable(el, handle) {
    let dx, dy, on = false;
    handle.addEventListener('mousedown', e => {
      if (e.target.classList.contains('wbtn')) return;
      on = true;
      const r = el.getBoundingClientRect();
      el.style.transform = 'none';
      el.style.left = r.left + 'px'; el.style.top = r.top + 'px';
      dx = e.clientX - r.left; dy = e.clientY - r.top;
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => { if (on) { el.style.left=(e.clientX-dx)+'px'; el.style.top=(e.clientY-dy)+'px'; } });
    document.addEventListener('mouseup',   ()  => { on = false; });
  }
  makeDraggable(document.getElementById('mainWindow'), document.getElementById('mainTitlebar'));

  /* ── Resize — all 8 edges/corners ───────────── */
  const win = document.getElementById('mainWindow');
  const MIN_W = 300, MIN_H = 220;
  let resizeDir = null, rx, ry, rw, rh, rl, rt;

  // Each resize zone is an absolutely-positioned div layered on the window border
  const DIRS = [
    { id:'rs-n',  style:'top:-4px;left:8px;right:8px;height:8px;cursor:n-resize;',          dir:'n'  },
    { id:'rs-s',  style:'bottom:-4px;left:8px;right:8px;height:8px;cursor:s-resize;',        dir:'s'  },
    { id:'rs-w',  style:'left:-4px;top:8px;bottom:8px;width:8px;cursor:w-resize;',           dir:'w'  },
    { id:'rs-e',  style:'right:-4px;top:8px;bottom:8px;width:8px;cursor:e-resize;',          dir:'e'  },
    { id:'rs-nw', style:'top:-4px;left:-4px;width:12px;height:12px;cursor:nw-resize;',       dir:'nw' },
    { id:'rs-ne', style:'top:-4px;right:-4px;width:12px;height:12px;cursor:ne-resize;',      dir:'ne' },
    { id:'rs-sw', style:'bottom:-4px;left:-4px;width:12px;height:12px;cursor:sw-resize;',    dir:'sw' },
    { id:'rs-se', style:'bottom:-4px;right:-4px;width:12px;height:12px;cursor:se-resize;',   dir:'se' },
  ];
  DIRS.forEach(({ id, style, dir }) => {
    const z = document.createElement('div');
    z.id = id;
    z.setAttribute('style', 'position:absolute;z-index:10;' + style);
    win.appendChild(z);
    z.addEventListener('mousedown', e => {
      resizeDir = dir;
      rx = e.clientX; ry = e.clientY;
      rw = win.offsetWidth; rh = win.offsetHeight;
      const r = win.getBoundingClientRect();
      rl = r.left; rt = r.top;
      win.style.transform = 'none';
      win.style.left = rl + 'px'; win.style.top = rt + 'px';
      e.preventDefault(); e.stopPropagation();
    });
  });

  document.addEventListener('mousemove', e => {
    if (!resizeDir) return;
    const dx = e.clientX - rx, dy = e.clientY - ry;
    let newW = rw, newH = rh, newL = rl, newT = rt;

    if (resizeDir.includes('e')) newW = Math.max(MIN_W, rw + dx);
    if (resizeDir.includes('s')) newH = Math.max(MIN_H, rh + dy);
    if (resizeDir.includes('w')) { newW = Math.max(MIN_W, rw - dx); newL = rl + (rw - newW); }
    if (resizeDir.includes('n')) { newH = Math.max(MIN_H, rh - dy); newT = rt + (rh - newH); }

    win.style.width  = newW + 'px';
    win.style.height = newH + 'px';
    win.style.left   = newL + 'px';
    win.style.top    = newT + 'px';
  });

  document.addEventListener('mouseup', () => { resizeDir = null; });

  /* ── ADD DIALOG ──────────────────────────────── */
  function openAdd() {
    ['addName','addUrl','addB64','addEmoji'].forEach(id => document.getElementById(id).value='');
    document.getElementById('iconPreview').innerHTML = '🔗';
    const r = win.getBoundingClientRect();
    const d = document.getElementById('addDialog');
    d.style.left = (r.left + r.width/2 - 180)+'px';
    d.style.top  = (r.top  + r.height/2 - 140)+'px';
    d.classList.add('open');
    document.getElementById('addOverlay').classList.add('active');
    document.getElementById('addName').focus();
    makeDraggable(d, document.getElementById('addTitlebar'));
  }

  ['addB64','addEmoji'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      const b64 = document.getElementById('addB64').value.trim();
      const em  = document.getElementById('addEmoji').value.trim();
      const p   = document.getElementById('iconPreview');
      if (b64) {
        const src = b64.startsWith('data:') ? b64 : 'data:image/png;base64,'+b64;
        p.innerHTML = `<img src="${src}" onerror="this.parentNode.innerHTML='❌'" />`;
      } else { p.innerHTML = em || '🔗'; }
    });
  });

  function confirmAdd() {
    const name = document.getElementById('addName').value.trim();
    const url  = document.getElementById('addUrl').value.trim();
    const b64  = document.getElementById('addB64').value.trim();
    const em   = document.getElementById('addEmoji').value.trim();
    if (!name) { document.getElementById('addName').focus(); return; }
    let icon = b64
      ? 'img:' + (b64.startsWith('data:') ? b64 : 'data:image/png;base64,'+b64)
      : (em || '🔗');
    APPS.push({ name, url: url||'#', icon, color:'#000080' });
    selectedIndex = null;
    renderGrid();
    closeAdd();
  }

  function closeAdd() {
    document.getElementById('addDialog').classList.remove('open');
    document.getElementById('addOverlay').classList.remove('active');
  }

  /* ── REMOVE DIALOG ───────────────────────────── */
  function openRemove() {
    if (selectedIndex === null) return;
    document.getElementById('rmMsg').textContent =
      `Are you sure you want to remove "${APPS[selectedIndex].name}"?`;
    const r = win.getBoundingClientRect();
    const d = document.getElementById('rmDialog');
    d.style.left = (r.left + r.width/2 - 145)+'px';
    d.style.top  = (r.top  + r.height/2 - 80)+'px';
    d.classList.add('open');
    document.getElementById('rmOverlay').classList.add('active');
    makeDraggable(d, document.getElementById('rmTitlebar'));
  }

  function confirmRemove() {
    if (selectedIndex === null) return;
    APPS.splice(selectedIndex, 1);
    selectedIndex = null;
    document.getElementById('btnRemove').disabled = true;
    renderGrid();
    closeRemove();
  }

  function closeRemove() {
    document.getElementById('rmDialog').classList.remove('open');
    document.getElementById('rmOverlay').classList.remove('active');
  }

  /* ── Keyboard shortcuts ──────────────────────── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape')  { closeAdd(); closeRemove(); }
    if (e.key === 'Delete' && selectedIndex !== null && !document.getElementById('addDialog').classList.contains('open'))
      openRemove();
    if (e.key === 'Enter') {
      if (document.getElementById('addDialog').classList.contains('open'))  confirmAdd();
      if (document.getElementById('rmDialog').classList.contains('open'))  confirmRemove();
    }
  });

  renderGrid();
</script>
</body>
</html>
